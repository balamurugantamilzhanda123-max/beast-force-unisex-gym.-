<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | BEAST FORCE UNISEX GYM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-body">
  <main class="login-shell">
    <section class="login-panel glass-panel">
      <a class="brand login-brand" href="index.html"><span class="brand-mark">BF</span><span class="brand-copy">BEAST FORCE</span></a>
      <h1>Admin Login</h1>
      <p>Secure access for gym owners and website managers.</p>
      <form id="adminLoginForm">
        <label>Email Address<input type="email" name="email" autocomplete="email" required></label>
        <label>Password<input type="password" name="password" autocomplete="current-password" required></label>
        <button class="btn primary" type="submit">Login</button>
        <p class="form-status" id="loginStatus" aria-live="polite"></p>
      </form>
      <small>Configure Firebase Auth and admin allowlist in <code>js/firebase-config.js</code>.</small>
    </section>
  </main>
  <script type="module" src="js/admin-auth.js"></script>
</body>
</html>
